# =====================================================
# Panel de administración MPC — Sveltia CMS
# El cliente edita aquí; cada guardado hace commit a
# GitHub y Vercel republica el sitio (~1 minuto).
# =====================================================
# Login: botón "Sign in with GitHub" requiere el proxy OAuth (ver GUIA-ADMIN.md).
# Mientras tanto funciona "Sign in with a personal access token" de Sveltia.
backend:
  name: github
  repo: mpcenter/miami-photography-center
  branch: main

site_url: https://miamiphotographycenter.com
display_url: https://miamiphotographycenter.com
logo_url: https://miamiphotographycenter.vercel.app/favicon.svg

media_folder: public/uploads
public_folder: /uploads

collections:
  - name: banners
    label: Inicio — Banner promocional
    label_singular: Banner
    description: Imágenes del carrusel promocional en la página de inicio. Sube tu imagen, ponle orden y actívala. Si pones varias, se rotan solas. Tamaño recomendado 1600×480 px.
    folder: src/content/banners
    extension: json
    format: json
    create: true
    delete: true
    identifier_field: alt
    summary: '{{alt}} (orden {{order}})'
    fields:
      - name: image
        label: Imagen del banner
        widget: image
        hint: Tamaño recomendado 1600×480 px (horizontal). Puedes poner texto encima con los campos de abajo.
      - name: text
        label: Texto sobre la imagen (opcional, español)
        widget: string
        required: false
        hint: 'Ej.: 10% de descuento para primeros servicios durante todo el mes de julio. Se muestra sobre la imagen.'
      - name: textEn
        label: Texto en inglés (opcional)
        widget: string
        required: false
        hint: 'Versión en inglés del texto. Si lo dejas vacío, se usa el español.'
      - name: highlight
        label: Parte a resaltar en amarillo (opcional)
        widget: string
        required: false
        hint: 'Escribe el fragmento exacto del texto que quieres en amarillo. Ej.: 10%'
      - name: alt
        label: Descripción de la imagen (para Google y accesibilidad)
        widget: string
        default: 'Promoción Miami Photography Center'
      - name: link
        label: Enlace al hacer clic (opcional)
        widget: string
        required: false
        hint: 'Interno: /store, /membership, /sensor-cleaning … o un enlace externo https://…'
      - name: order
        label: Orden
        widget: number
        value_type: int
        default: 1
        hint: Menor número aparece primero.
      - name: enabled
        label: Activado (mostrar en el sitio)
        widget: boolean
        default: true

  - name: products
    label: Tienda — Productos
    label_singular: Producto
    description: Cámaras y accesorios de la tienda online. Crear, editar o eliminar productos. Los cambios se publican solos en ~1 minuto.
    folder: src/content/products
    extension: json
    format: json
    create: true
    delete: true
    identifier_field: slug
    slug: '{{fields.slug}}'
    summary: '{{name.es}} — ${{price}}'
    fields:
      - name: slug
        label: URL del producto (slug)
        widget: string
        hint: Solo minúsculas y guiones, sin espacios. Ej. canon-eos-r6-body
        pattern: ['^[a-z0-9]+(-[a-z0-9]+)*$', 'Solo minúsculas, números y guiones']
      - name: name
        label: Nombre
        widget: object
        fields:
          - { name: es, label: 'Nombre (Español)', widget: string }
          - { name: en, label: 'Nombre (Inglés)', widget: string }
      - name: price
        label: Precio (USD)
        widget: number
        value_type: float
        min: 0
      - name: category
        label: Categoría
        widget: object
        fields:
          - name: es
            label: 'Categoría (Español)'
            widget: select
            options: ['Cámaras', 'Lentes', 'Accesorios']
          - name: en
            label: 'Categoría (Inglés)'
            widget: select
            options: ['Cameras', 'Lenses', 'Accessories']
      - name: img
        label: Foto del producto
        widget: image
        hint: Sube una foto del producto (idealmente cuadrada o 3:2, fondo limpio).
      - name: desc
        label: Descripción
        widget: object
        fields:
          - { name: es, label: 'Descripción (Español)', widget: text }
          - { name: en, label: 'Descripción (Inglés)', widget: text }
      - name: condition
        label: Estado / condición
        widget: object
        fields:
          - { name: es, label: 'Condición (Español)', widget: string, default: 'Revisado y calibrado in-house — garantía de 6 meses' }
          - { name: en, label: 'Condición (Inglés)', widget: string, default: 'Inspected & serviced in-house — 6-month warranty' }
      - name: specs
        label: Especificaciones (viñetas)
        widget: object
        fields:
          - name: es
            label: 'Especificaciones (Español)'
            widget: list
            field: { name: item, label: Punto, widget: string }
          - name: en
            label: 'Especificaciones (Inglés)'
            widget: list
            field: { name: item, label: Item, widget: string }
